seed: 42

experiment:
  name: "mimicbp_unet1d"
  output_dir: "runs"     # 所有实验输出到 runs/<timestamp>_<name>/
  log_every_n_steps: 50

trainer:
  max_epochs: 10
  accelerator: "gpu"    # auto/cpu/gpu
  devices: 1             # 1 或 2/4/8 (多卡时建议 strategy: ddp)
  strategy: "auto"       # "ddp" / "auto"
  precision: "16-mixed"  # "32" / "16-mixed" / "bf16-mixed"
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0
  deterministic: true
  enable_checkpointing: true

data:
  target: "scripts.data.mimicbp.MimicBPDataModule"
  params:
    batch_size: 128
    num_workers: 4
    data_dir: "E:\\datasets\\ppg2ecg\\MIMIC-BP"
    train_split: "train_subjects.txt"
    val_split: "val_subjects.txt"
    test_split: "test_subjects.txt"
    batch_size: 16
    num_segments_per_patient: 30
    fs: 125
    return_dict: true

model:
  target: "scripts.models.unet1d.LitUNet1D"
  params:
    # net
    in_ch: 1
    out_ch: 1
    base_ch: 32
    depth: 4
    # optim
    lr: 0.001
    weight_decay: 0.0001
    # loss
    loss: "mse"