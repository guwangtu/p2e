seed: 42

experiment:
  name: "ablation_window_8"
  output_dir: "runs"
  log_every_n_steps: 50

trainer:
  max_epochs: 100
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "16-mixed"
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  deterministic: true
  enable_checkpointing: true

data:
  target: "scripts.data.mimicbp_v2.MimicBPCycleDataModule"
  params:
    data_dir: "/root/autodl-tmp/alice/mimicbp"
    train_split: "train_subjects.txt"
    val_split: "val_subjects.txt"
    test_split: "test_subjects.txt"
    window_size: 8
    cycle_len: 256
    overlap_len: 32
    stride: 16
    fs: 125
    preprocessed: true
    batch_size: 64
    num_workers: 4
    pin_memory: true
    drop_last: true

model:
  target: "scripts.models.cycle_flow.LitCycleFlow"
  params:
    enc_base_ch: 32
    enc_depth: 4
    feat_dim: 128
    time_dim: 32
    global_hidden: 256
    local_hidden: 128
    global_out: 128
    local_out: 64
    overlap_dim: 32
    use_mamba: false
    flow_hidden: 256
    flow_layers: 4
    flow_heads: 4
    latent_dim: 128
    dec_hidden: 256
    cycle_len: 256
    overlap_len: 32
    kp_hidden: 128
    lambda_recon: 1.0
    lambda_cfm: 1.0
    lambda_morph: 0.1
    lambda_align: 0.01
    lr: 0.0001
    weight_decay: 0.00001
    warmup_steps: 1000
    n_sample_steps: 20
